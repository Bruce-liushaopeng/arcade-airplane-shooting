<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050611">
    <title>Sky Circuit 45</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="cabinet" aria-label="Sky Circuit 45 arcade shooter">
      <aside class="side-panel left-panel" aria-hidden="true">
        <span>194X</span>
        <span>RAID</span>
        <span>UFO</span>
      </aside>
      <section id="gameShell" class="game-shell">
        <canvas id="gameCanvas" width="540" height="960" aria-label="Sky Circuit 45 game canvas"></canvas>
        <div id="overlay" class="overlay"></div>
      </section>
      <aside class="side-panel right-panel" aria-hidden="true">
        <span>BOMB</span>
        <span>POWER</span>
        <span>COIN</span>
      </aside>
    </main>
    <script src="main.js"></script>
  </body>
</html>
